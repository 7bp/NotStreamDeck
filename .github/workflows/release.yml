name: Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  agent:
    name: Agent – ${{ matrix.target }}
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        include:
          - target: aarch64-apple-darwin
            os: macos-latest
            artifact: notstreamdeck-agent-macos-arm64
          - target: x86_64-apple-darwin
            os: macos-latest
            artifact: notstreamdeck-agent-macos-x64
          - target: x86_64-pc-windows-gnu
            os: macos-latest
            artifact: notstreamdeck-agent-windows-x64.exe

    steps:
      - uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Install cross-linker (Windows)
        if: matrix.target == 'x86_64-pc-windows-gnu'
        run: brew install mingw-w64

      - name: Build
        run: cargo build --release --target ${{ matrix.target }}
        working-directory: server

      - name: Rename binary
        run: |
          if [ "${{ matrix.target }}" = "x86_64-pc-windows-gnu" ]; then
            cp server/target/${{ matrix.target }}/release/notstreamdeck-agent.exe ${{ matrix.artifact }}
          else
            cp server/target/${{ matrix.target }}/release/notstreamdeck-agent ${{ matrix.artifact }}
          fi
        shell: bash

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact }}
          path: ${{ matrix.artifact }}

  frontend:
    name: Frontend
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install server dependencies
        run: npm install
        working-directory: control

      - name: Install client dependencies
        run: npm install
        working-directory: control/client

      - name: Build
        run: npm run build
        working-directory: control/client

      - name: Verify build output
        run: ls -la control/client/dist/
        shell: bash

      - name: Package frontend
        run: |
          mkdir -p notstreamdeck-frontend
          cp -r control/client/dist/* notstreamdeck-frontend/
          cp control/package.json notstreamdeck-frontend/
          cp control/server.js notstreamdeck-frontend/
          cp control/store.js notstreamdeck-frontend/
          cd notstreamdeck-frontend && zip -r ../notstreamdeck-frontend.zip .

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: notstreamdeck-frontend
          path: notstreamdeck-frontend.zip

  release:
    name: Create Release
    needs: [agent, frontend]
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Download all artifacts
        uses: actions/download-artifact@v4

      - name: Prepare release files
        run: |
          mkdir -p release-assets
          find . -name 'notstreamdeck-*' -type f -exec cp {} release-assets/ \;
          ls -la release-assets/

      - name: Create release
        uses: softprops/action-gh-release@v2
        with:
          name: NotStreamDeck ${{ github.ref_name }}
          fail_on_unmatched_files: true
          files: release-assets/*
