<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>NotStreamDeck</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
html,body{width:100%;height:100%;overflow:hidden}
body{background:#111;color:#eee;font-family:system-ui,-apple-system,sans-serif;display:flex;align-items:center;justify-content:center}
.loader{text-align:center}
.spinner{width:40px;height:40px;border:3px solid #2a2a2a;border-top-color:#00b43c;border-radius:50%;animation:spin 1s linear infinite;margin:0 auto 16px}
@keyframes spin{to{transform:rotate(360deg)}}
p{color:#666;font-size:.9rem}
</style>
</head>
<body>
<div class="loader">
<div class="spinner"></div>
<p>Connecting to server…</p>
</div>
<script>
setInterval(()=>{fetch('/',{method:'HEAD'}).then(r=>{if(r.ok)location.reload()}).catch(()=>{})},3000);
</script>
</body>
</html>
